name: Build macOS Beta

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: macOS unsigned beta
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Enable Corepack
        run: corepack enable

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/src-tauri -> target
          key: macos-latest

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate macOS icon assets
        working-directory: apps/desktop
        run: pnpm exec tauri icon src-tauri/icons/icon.png

      - name: Typecheck desktop
        run: pnpm --filter @velora/desktop typecheck

      - name: Test SDK
        run: pnpm --filter @velora/sdk test

      - name: Build desktop frontend
        run: pnpm --filter @velora/desktop build

      - name: Cargo check
        working-directory: apps/desktop/src-tauri
        run: cargo check

      - name: Build unsigned macOS beta
        working-directory: apps/desktop
        env:
          TAURI_SIGNING_PRIVATE_KEY: ""
        run: pnpm exec tauri build --config src-tauri/tauri.macos.conf.json

      - name: Compute SHA-256
        shell: bash
        run: |
          mkdir -p releases/beta/macos/latest
          find apps/desktop/src-tauri/target/release/bundle -type f \( -name "*.dmg" -o -name "*.app.tar.gz" \) -print0 | while IFS= read -r -d '' file; do
            cp "$file" "releases/beta/macos/latest/$(basename "$file")"
            shasum -a 256 "$file" > "releases/beta/macos/latest/$(basename "$file").sha256.txt"
          done

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: velora-macos-unsigned-beta
          path: releases/beta/macos/latest
          if-no-files-found: error
